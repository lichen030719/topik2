<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPIK2 新韓檢中高級字彙 60天搶分王</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--teal:#2dd4bf;--teal2:#14b8a6;--teal-dim:#0d9488;--gold:#f59e0b;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;--red:#f87171;--green:#34d399;--shadow:0 4px 32px rgba(0,0,0,.6);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;}
#loading.done{display:none;}
#loading h2{font-size:18px;color:var(--teal);}
#loading p{font-size:13px;color:var(--text2);}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SIDEBAR */
#sidebar{width:280px;min-width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#sidebar-header{padding:20px 18px 16px;border-bottom:1px solid var(--border);background:var(--bg3);}
#sidebar-header h1{font-size:13px;font-weight:700;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;}
#sidebar-header p{font-size:11px;color:var(--text2);margin-top:4px;}
#search-box{padding:12px 14px;border-bottom:1px solid var(--border);}
#search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
#search-input:focus{border-color:var(--teal);}
#search-input::placeholder{color:var(--text3);}
#nav-tree{flex:1;overflow-y:auto;padding:8px 0;}
#nav-tree::-webkit-scrollbar{width:4px;}
#nav-tree::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.part-group{margin-bottom:2px;}
.part-header{display:flex;align-items:center;padding:8px 14px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);transition:background .15s;user-select:none;gap:8px;}
.part-header:hover{background:var(--bg3);color:var(--text);}
.part-header.active{color:var(--teal);}
.part-arrow{font-size:10px;transition:transform .2s;display:inline-block;}
.part-group.open .part-arrow{transform:rotate(90deg);}
.part-badge{background:var(--bg3);border-radius:4px;padding:1px 6px;font-size:10px;font-family:'Space Mono',monospace;}
.part-label{flex:1;}
.day-list{display:none;padding:2px 0;}
.part-group.open .day-list{display:block;}
.day-item{display:flex;align-items:center;padding:6px 14px 6px 30px;cursor:pointer;font-size:12px;color:var(--text2);transition:background .15s,color .15s;gap:8px;}
.day-item:hover{background:var(--bg3);color:var(--text);}
.day-item.active{background:rgba(45,212,191,.1);color:var(--teal);border-right:2px solid var(--teal);}
.day-progress-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.day-progress-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .4s ease;}
.day-count{font-size:10px;font-family:'Space Mono',monospace;white-space:nowrap;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;}
#topbar-title{font-size:16px;font-weight:700;}
#topbar-sub{font-size:12px;color:var(--text2);}
.spacer{flex:1;}
.tab-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
.tab-btn:hover{border-color:var(--teal);color:var(--teal);}
.tab-btn.active{background:var(--teal);border-color:var(--teal);color:#000;font-weight:700;}
#content{flex:1;overflow-y:auto;padding:24px;}
#content::-webkit-scrollbar{width:6px;}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* FLASHCARD */
#flashcard-view{display:flex;flex-direction:column;align-items:center;gap:20px;max-width:640px;margin:0 auto;}
.card-counter{font-size:13px;color:var(--text2);font-family:'Space Mono',monospace;}
.card-wrapper{width:100%;perspective:1200px;}
.card{width:100%;min-height:320px;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.card.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px;min-height:320px;}
.card-front{background:linear-gradient(135deg,#161b22 0%,#0d1117 100%);border:1px solid var(--border);box-shadow:var(--shadow);}
.card-back{background:linear-gradient(135deg,#0a1628 0%,#0d2137 100%);border:1px solid var(--teal-dim);box-shadow:0 4px 32px rgba(45,212,191,.15);transform:rotateY(180deg);}
.card-num{font-family:'Space Mono',monospace;font-size:12px;color:var(--text3);position:absolute;top:18px;left:22px;}
.card-pos{position:absolute;top:18px;right:22px;background:rgba(45,212,191,.15);color:var(--teal);border-radius:6px;padding:2px 10px;font-size:12px;font-weight:700;}
.card-word{font-family:'Noto Serif KR',serif;font-size:52px;font-weight:700;color:var(--text);text-align:center;line-height:1.2;}
.card-hint{margin-top:20px;font-size:12px;color:var(--text3);}
.card-meaning{font-size:30px;font-weight:700;color:var(--teal);text-align:center;margin-bottom:20px;}
.card-example-ko{font-family:'Noto Serif KR',serif;font-size:15px;color:var(--text);text-align:center;line-height:1.8;margin-bottom:10px;}
.card-example-zh{font-size:13px;color:var(--text2);text-align:center;line-height:1.7;}
.card-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;}
.ctrl-btn{padding:10px 24px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s;}
.ctrl-btn:hover{border-color:var(--teal);color:var(--teal);}
.ctrl-btn.primary{background:var(--teal);border-color:var(--teal);color:#000;font-weight:700;}
.ctrl-btn:disabled{opacity:.3;cursor:default;}
.known-btn{border-color:var(--green)!important;color:var(--green)!important;}
.known-btn:hover{background:rgba(52,211,153,.1)!important;}
.unknown-btn{border-color:var(--red)!important;color:var(--red)!important;}
.unknown-btn:hover{background:rgba(248,113,113,.1)!important;}
.progress-row{width:100%;display:flex;flex-direction:column;gap:6px;}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);font-family:'Space Mono',monospace;}
.progress-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));border-radius:3px;transition:width .4s ease;}
.day-complete{background:rgba(52,211,153,.1);border:1px solid var(--green);border-radius:12px;padding:20px;text-align:center;color:var(--green);font-size:16px;font-weight:700;}

/* LIST VIEW */
#list-view{max-width:900px;margin:0 auto;}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.word-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;}
.word-card:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.word-card.known-card{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.04);}
.wc-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.wc-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);}
.wc-pos{background:rgba(45,212,191,.12);color:var(--teal);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700;}
.wc-known-badge{margin-left:auto;font-size:11px;color:var(--green);}
.wc-word{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;margin-bottom:4px;}
.wc-meaning{font-size:14px;color:var(--teal);font-weight:500;}
.wc-no-meaning{font-size:12px;color:var(--text3);font-style:italic;}

/* QUIZ VIEW */
#quiz-view{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:24px;}
.quiz-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px;text-align:center;}
.quiz-word{font-family:'Noto Serif KR',serif;font-size:48px;font-weight:700;margin-bottom:20px;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.quiz-opt{padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;line-height:1.4;}
.quiz-opt:hover:not(:disabled){border-color:var(--teal);color:var(--teal);}
.quiz-opt.correct{background:rgba(52,211,153,.15);border-color:var(--green);color:var(--green);}
.quiz-opt.wrong{background:rgba(248,113,113,.1);border-color:var(--red);color:var(--red);}
.quiz-opt:disabled{cursor:default;}
.quiz-score-row{display:flex;gap:16px;justify-content:center;font-size:14px;font-family:'Space Mono',monospace;}
.q-correct{color:var(--green);}
.q-wrong{color:var(--red);}
.quiz-result{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;text-align:center;}
.result-score{font-size:56px;font-weight:700;color:var(--teal);font-family:'Space Mono',monospace;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-num{font-size:28px;font-weight:700;color:var(--teal);font-family:'Space Mono',monospace;}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:4px;}

/* SEARCH OVERLAY */
#search-results{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;backdrop-filter:blur(4px);padding:60px 24px 24px;overflow-y:auto;}
#search-results.show{display:block;}
.sr-inner{max-width:700px;margin:0 auto;}
.sr-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.sr-title{font-size:16px;font-weight:700;}
.sr-close{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;}
.sr-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:10px;cursor:pointer;transition:all .15s;}
.sr-item:hover{border-color:var(--teal);}
.sr-word{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;}
.sr-meta{font-size:12px;color:var(--text2);margin-top:4px;}
.sr-meaning{color:var(--teal);font-size:14px;margin-top:4px;}

/* MOBILE */
#menu-btn{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px;}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;}
@media(max-width:720px){
  #menu-btn{display:block;}
  #sidebar{position:fixed;left:-280px;top:0;bottom:0;z-index:50;transition:left .3s ease;}
  #sidebar.open{left:0;}
  #sidebar-overlay.show{display:block;}
  #content{padding:16px;}
  .card-word{font-size:38px;}
  .card-face{padding:28px 20px;}
  .ctrl-btn{padding:8px 16px;font-size:13px;}
  .quiz-options{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>載入中…</h2>
  <p>正在讀取 manifest.json</p>
</div>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>TOPIK 2 字彙</h1>
    <p>新韓檢中高級 · 60天搶分王</p>
  </div>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="搜尋韓文或中文意思…" autocomplete="off">
  </div>
  <div id="nav-tree"></div>
</div>

<div id="main">
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    <div>
      <div id="topbar-title">TOPIK2 字彙</div>
      <div id="topbar-sub">載入中…</div>
    </div>
    <div class="spacer"></div>
    <button class="tab-btn active" onclick="switchView('card')">📇 翻牌</button>
    <button class="tab-btn" onclick="switchView('list')">📋 列表</button>
    <button class="tab-btn" onclick="switchView('quiz')">✏️ 測驗</button>
  </div>
  <div id="content">
    <div id="flashcard-view"></div>
    <div id="list-view" style="display:none"></div>
    <div id="quiz-view" style="display:none"></div>
  </div>
</div>

<div id="search-results">
  <div class="sr-inner">
    <div class="sr-header">
      <div class="sr-title" id="sr-title">搜尋結果</div>
      <button class="sr-close" onclick="closeSearch()">✕ 關閉</button>
    </div>
    <div id="sr-list"></div>
  </div>
</div>

<script>
// ── STATE ──
let MANIFEST = null;
let dayCache = {};        // day number → word array
let currentDay = 1;
let currentWords = [];    // currently loaded day's words
let currentView = 'card';
let cardIndex = 0;
let isFlipped = false;
let quizState = null;

// ── BOOT: load manifest ──
fetch('manifest.json')
  .then(r => { if(!r.ok) throw new Error('找不到 manifest.json'); return r.json(); })
  .then(data => {
    MANIFEST = data;
    document.getElementById('loading').classList.add('done');
    buildSidebar();
    loadDay(1);
  })
  .catch(err => {
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;color:var(--red)">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <h2 style="margin-bottom:8px">無法載入資料</h2>
        <p style="color:var(--text2)">${err.message}</p>
        <p style="color:var(--text3);font-size:12px;margin-top:16px">請確認 manifest.json 與 index.html 在同一個資料夾</p>
      </div>`;
  });

// ── LOAD DAY (lazy, cached) ──
async function loadDayData(dayNum) {
  if (dayCache[dayNum]) return dayCache[dayNum];
  const meta = MANIFEST.days.find(d => d.day === dayNum);
  if (!meta) return [];
  const r = await fetch(meta.file);
  if (!r.ok) return [];
  const words = await r.json();
  dayCache[dayNum] = words;
  return words;
}

async function loadDay(dayNum) {
  currentDay = dayNum;
  cardIndex = 0;
  isFlipped = false;

  const meta = MANIFEST.days.find(d => d.day === dayNum);
  const part = MANIFEST.parts.find(p => p.num === (meta ? meta.part : 1));

  document.getElementById('topbar-title').textContent = 'Day ' + dayNum;
  document.getElementById('topbar-sub').textContent = (part ? part.zh : '') + ' · 載入中…';

  currentWords = await loadDayData(dayNum);

  document.getElementById('topbar-sub').textContent =
    (part ? part.zh : '') + ' · ' + currentWords.length + ' 個單字';

  updateSidebarDay(dayNum);

  if (currentView === 'card') renderCard();
  else if (currentView === 'list') renderList();
  else startQuiz();
}

// ── PROGRESS ──
function getP(){try{return JSON.parse(localStorage.getItem('topik2_prog')||'{}')}catch{return{}}}
function saveP(p){localStorage.setItem('topik2_prog',JSON.stringify(p))}
function markKnown(id,day){const p=getP();if(!p[day])p[day]={};p[day][id]=1;saveP(p)}
function markUnknown(id,day){const p=getP();if(p[day])delete p[day][id];saveP(p)}
function isKnown(id,day){const p=getP();return!!(p[day]&&p[day][id])}
function getDayKnown(day){return Object.keys(getP()[day]||{}).length}

// ── SIDEBAR ──
function buildSidebar(){
  const nav = document.getElementById('nav-tree');
  nav.innerHTML = '';
  MANIFEST.parts.forEach((part, pi) => {
    const grp = document.createElement('div');
    grp.className = 'part-group' + (pi === 0 ? ' open' : '');
    const hdr = document.createElement('div');
    hdr.className = 'part-header' + (pi === 0 ? ' active' : '');
    hdr.innerHTML = `<span class="part-badge">P${String(part.num).padStart(2,'0')}</span><span class="part-label">${part.zh}</span><span class="part-arrow">›</span>`;
    hdr.onclick = () => {
      grp.classList.toggle('open');
      document.querySelectorAll('.part-header').forEach(h => h.classList.remove('active'));
      if (grp.classList.contains('open')) hdr.classList.add('active');
    };
    const dl = document.createElement('div');
    dl.className = 'day-list';
    part.days.forEach(dn => {
      const meta = MANIFEST.days.find(d => d.day === dn);
      const total = meta ? meta.word_count : 40;
      const known = getDayKnown(dn);
      const pct = total > 0 ? (known / total * 100).toFixed(0) : 0;
      const di = document.createElement('div');
      di.className = 'day-item' + (dn === currentDay ? ' active' : '');
      di.id = 'nav-day-' + dn;
      di.innerHTML = `<span>Day ${dn}</span><div class="day-progress-bar"><div class="day-progress-fill" style="width:${pct}%"></div></div><span class="day-count">${known}/${total}</span>`;
      di.onclick = () => { loadDay(dn); closeSidebar(); };
      dl.appendChild(di);
    });
    grp.appendChild(hdr);
    grp.appendChild(dl);
    nav.appendChild(grp);
  });
}

function updateSidebarDay(dn){
  document.querySelectorAll('.day-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-day-' + dn);
  if (!el) return;
  el.classList.add('active');
  const meta = MANIFEST.days.find(d => d.day === dn);
  const total = meta ? meta.word_count : currentWords.length;
  const known = getDayKnown(dn);
  const pct = total > 0 ? (known / total * 100).toFixed(0) : 0;
  el.querySelector('.day-progress-fill').style.width = pct + '%';
  el.querySelector('.day-count').textContent = known + '/' + total;
}

// ── HELPERS ──
// word ID for progress tracking: use "id" field from JSON, fallback to word_no
function wordId(w) { return w.id || (String(currentDay) + '-' + w.word_no); }

// pos display: use pos_short if available, else derive from pos_zh
function posDisplay(w) {
  if (w.pos_short) return w.pos_short;
  const map = {'名詞':'名','動詞':'動','副詞':'副','形容詞':'形','冠形詞':'冠'};
  return map[w.pos_zh] || w.pos_zh || '';
}

// ── FLASHCARD VIEW ──
function renderCard(){
  const el = document.getElementById('flashcard-view');
  if (!currentWords.length) {
    el.innerHTML = '<p style="color:var(--text2);text-align:center;padding:60px 20px">此日無資料</p>';
    return;
  }
  const w = currentWords[cardIndex];
  const wid = wordId(w);
  const known = isKnown(wid, currentDay);
  const kc = getDayKnown(currentDay);
  const total = currentWords.length;
  const pct = total > 0 ? (kc / total * 100).toFixed(0) : 0;
  const hasFull = w.meaning_zh && w.meaning_zh.trim();
  const pos = posDisplay(w);

  const backContent = hasFull
    ? `<div class="card-num">#${w.word_no}</div>
       <div class="card-meaning">${w.meaning_zh}</div>
       ${w.example_ko ? `<div class="card-example-ko">${w.example_ko}</div>` : ''}
       ${w.example_zh ? `<div class="card-example-zh">${w.example_zh}</div>` : ''}`
    : `<div class="card-num">#${w.word_no}</div>
       <div style="color:var(--text3);text-align:center">
         <div style="font-size:36px;margin-bottom:16px">📖</div>
         <div>此單字詳細資料尚待補充</div>
         <div style="margin-top:12px;font-size:12px">已記住就標記 ✓</div>
       </div>`;

  el.innerHTML = `
<div class="card-counter">${cardIndex + 1} / ${total}</div>
<div class="card-wrapper">
  <div class="card${isFlipped ? ' flipped' : ''}" id="the-card" onclick="flipCard()">
    <div class="card-face card-front">
      <div class="card-num">#${w.word_no}</div>
      ${pos ? `<div class="card-pos">${pos}</div>` : ''}
      <div class="card-word">${w.word}</div>
      <div class="card-hint">點擊翻牌 · 空白鍵 · ← → 換牌 · Enter 熟記</div>
      ${known ? '<div style="position:absolute;bottom:18px;right:22px;color:var(--green);font-size:13px">✓ 已熟記</div>' : ''}
    </div>
    <div class="card-face card-back">${backContent}</div>
  </div>
</div>
<div class="card-controls">
  <button class="ctrl-btn" onclick="prevCard()" ${cardIndex === 0 ? 'disabled' : ''}>← 上一張</button>
  <button class="ctrl-btn unknown-btn" onclick="markCardUnknown()">✗ 需加強</button>
  <button class="ctrl-btn known-btn" onclick="markCardKnown()">✓ 已熟記</button>
  <button class="ctrl-btn" onclick="nextCard()" ${cardIndex === total - 1 ? 'disabled' : ''}>下一張 →</button>
</div>
<div class="progress-row">
  <div class="progress-info">
    <span>Day ${currentDay} 學習進度</span>
    <span>${kc}/${total} 已熟記 (${pct}%)</span>
  </div>
  <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
</div>
${kc === total && total > 0 ? `<div class="day-complete">🎉 Day ${currentDay} 完成！全部單字已熟記！</div>` : ''}`;
}

function flipCard(){isFlipped=!isFlipped;const c=document.getElementById('the-card');if(c)c.classList.toggle('flipped',isFlipped);}
function prevCard(){if(cardIndex>0){cardIndex--;isFlipped=false;renderCard();}}
function nextCard(){if(cardIndex<currentWords.length-1){cardIndex++;isFlipped=false;renderCard();}}
function markCardKnown(){
  const w=currentWords[cardIndex];markKnown(wordId(w),currentDay);
  updateSidebarDay(currentDay);
  if(cardIndex<currentWords.length-1){cardIndex++;isFlipped=false;}
  renderCard();
}
function markCardUnknown(){
  markUnknown(wordId(currentWords[cardIndex]),currentDay);
  updateSidebarDay(currentDay);renderCard();
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('search-input')===document.activeElement)return;
  if(currentView==='card'){
    if(e.key==='ArrowLeft')prevCard();
    else if(e.key==='ArrowRight')nextCard();
    else if(e.key===' '){e.preventDefault();flipCard();}
    else if(e.key==='Enter')markCardKnown();
  }
});

// ── LIST VIEW ──
function renderList(){
  const lv = document.getElementById('list-view');
  if (!currentWords.length) {
    lv.innerHTML = '<p style="color:var(--text2);text-align:center;padding:60px">此日無資料</p>';
    return;
  }
  const kc = getDayKnown(currentDay);
  const total = currentWords.length;
  const pct = (kc / total * 100).toFixed(0);
  lv.innerHTML = `
<div class="progress-row" style="margin-bottom:20px">
  <div class="progress-info"><span>Day ${currentDay} 學習進度</span><span>${kc}/${total} (${pct}%)</span></div>
  <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
</div>
<div class="word-grid">
${currentWords.map((w, i) => {
  const k = isKnown(wordId(w), currentDay);
  const hm = w.meaning_zh && w.meaning_zh.trim();
  const pos = posDisplay(w);
  return `<div class="word-card${k ? ' known-card' : ''}" onclick="goToCardIndex(${i})">
    <div class="wc-header">
      <span class="wc-num">#${w.word_no}</span>
      ${pos ? `<span class="wc-pos">${pos}</span>` : ''}
      ${k ? '<span class="wc-known-badge">✓</span>' : ''}
    </div>
    <div class="wc-word">${w.word}</div>
    ${hm ? `<div class="wc-meaning">${w.meaning_zh}</div>` : '<div class="wc-no-meaning">尚待補充</div>'}
  </div>`;
}).join('')}
</div>`;
}
function goToCardIndex(i){cardIndex=i;isFlipped=false;switchView('card');}

// ── QUIZ VIEW ──
function startQuiz(){
  const lv = document.getElementById('quiz-view');
  const qw = currentWords.filter(w => w.meaning_zh && w.meaning_zh.trim());
  if (qw.length < 4) {
    lv.innerHTML = `
      <div class="quiz-card" style="padding:40px;text-align:center">
        <div style="font-size:48px;margin-bottom:16px">📝</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">Day ${currentDay} 尚未有完整資料</div>
        <div style="color:var(--text2);font-size:14px;line-height:1.8">
          目前僅 Day 1 具備完整單字資料<br>其他日程持續更新中
        </div>
        <button class="ctrl-btn primary" style="margin:24px auto 0;display:block" onclick="loadDay(1)">前往 Day 1 測驗</button>
      </div>`;
    return;
  }
  quizState = {
    words: [...qw].sort(() => Math.random() - .5),
    allMeanings: currentWords.filter(w => w.meaning_zh).map(w => w.meaning_zh),
    idx: 0, correct: 0, wrong: 0
  };
  renderQuizCard();
}

function renderQuizCard(){
  const lv = document.getElementById('quiz-view');
  if (!quizState) return;
  const { words, allMeanings, idx, correct, wrong } = quizState;
  if (idx >= words.length) {
    const total = words.length, pct = Math.round(correct / total * 100);
    lv.innerHTML = `
<div class="stats-row">
  <div class="stat-box"><div class="stat-num q-correct">${correct}</div><div class="stat-lbl">答對</div></div>
  <div class="stat-box"><div class="stat-num" style="color:var(--gold)">${pct}%</div><div class="stat-lbl">正確率</div></div>
  <div class="stat-box"><div class="stat-num q-wrong">${wrong}</div><div class="stat-lbl">答錯</div></div>
</div>
<div class="quiz-result">
  <div class="result-score">${pct}%</div>
  <div style="font-size:16px;color:var(--text2);margin-top:8px">${pct>=80?'太棒了！🎉':pct>=60?'不錯！繼續加油 💪':'需要多複習 📚'}</div>
  <div style="color:var(--text2);font-size:14px;margin-top:8px">答對 ${correct} / ${total} 題</div>
  <div style="display:flex;gap:12px;justify-content:center;margin-top:24px">
    <button class="ctrl-btn" onclick="startQuiz()">🔄 再測一次</button>
    <button class="ctrl-btn primary" onclick="switchView('card')">📇 回到翻牌</button>
  </div>
</div>`;
    return;
  }
  const w = words[idx];
  const wrongs = allMeanings
    .filter(m => m !== w.meaning_zh)
    .sort(() => Math.random() - .5)
    .slice(0, 3);
  const opts = [w.meaning_zh, ...wrongs].sort(() => Math.random() - .5);
  lv.innerHTML = `
<div class="quiz-score-row">
  <span class="q-correct">✓ ${correct}</span>
  <span style="color:var(--text2)">${idx + 1}/${words.length}</span>
  <span class="q-wrong">✗ ${wrong}</span>
</div>
<div class="quiz-card">
  <div class="quiz-word">${w.word}</div>
  <div class="quiz-options">
    ${opts.map(o => `<button class="quiz-opt" onclick="answerQuiz(this,${JSON.stringify(o)},${JSON.stringify(w.meaning_zh)})">${o}</button>`).join('')}
  </div>
</div>`;
}

function answerQuiz(btn, chosen, correct){
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  if (chosen === correct) {
    btn.classList.add('correct');
    quizState.correct++;
    markKnown(wordId(quizState.words[quizState.idx]), currentDay);
    updateSidebarDay(currentDay);
  } else {
    btn.classList.add('wrong');
    quizState.wrong++;
  }
  quizState.idx++;
  setTimeout(renderQuizCard, 800);
}

// ── VIEW SWITCH ──
function switchView(v){
  currentView = v;
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', ['card','list','quiz'][i] === v));
  document.getElementById('flashcard-view').style.display = v==='card'?'flex':'none';
  document.getElementById('list-view').style.display = v==='list'?'block':'none';
  document.getElementById('quiz-view').style.display = v==='quiz'?'flex':'none';
  if(v==='card')renderCard();
  else if(v==='list')renderList();
  else startQuiz();
}

// ── SEARCH (searches only cached days) ──
let sTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(sTimer);
  const q = e.target.value.trim();
  if (!q) { closeSearch(); return; }
  sTimer = setTimeout(() => doSearch(q), 250);
});

async function doSearch(q){
  // Search all cached days first, then try to load current day if not cached
  const results = [];
  for (const [dayNum, words] of Object.entries(dayCache)) {
    for (const w of words) {
      if (w.word.includes(q) || (w.meaning_zh && w.meaning_zh.includes(q)) || (w.example_ko && w.example_ko.includes(q))) {
        results.push({...w, _day: parseInt(dayNum)});
      }
    }
    if (results.length >= 30) break;
  }
  document.getElementById('sr-title').textContent = `搜尋「${q}」— ${results.length} 筆${results.length>=30?'（僅顯示已載入的天）':''}`;
  document.getElementById('sr-list').innerHTML = results.map(w => {
    const part = MANIFEST.parts.find(p => p.days.includes(w._day));
    const pos = posDisplay(w);
    return `<div class="sr-item" onclick="goToWord(${w._day},${w.word_no - 1})">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="sr-word">${w.word}</span>
        ${pos ? `<span class="wc-pos">${pos}</span>` : ''}
        <span style="font-size:11px;color:var(--text3);margin-left:auto">Day ${w._day}</span>
      </div>
      <div class="sr-meta">${part ? part.zh : ''} · #${w.word_no}</div>
      ${w.meaning_zh ? `<div class="sr-meaning">${w.meaning_zh}</div>` : ''}
    </div>`;
  }).join('');
  document.getElementById('search-results').classList.add('show');
}

function closeSearch(){
  document.getElementById('search-results').classList.remove('show');
  document.getElementById('search-input').value = '';
}
function goToWord(dn, idx){
  closeSearch();
  cardIndex = idx;
  isFlipped = false;
  loadDay(dn);
  switchView('card');
}

// ── MOBILE SIDEBAR ──
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}
</script>
</body>
</html>
