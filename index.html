<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPIK2 新韓檢中高級字彙 60天搶分王</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --teal:#2dd4bf;--teal2:#14b8a6;--teal-dim:#0d9488;
  --gold:#f59e0b;--text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --red:#f87171;--green:#34d399;--pink:#f472b6;--orange:#fb923c;
  --shadow:0 4px 32px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;}
#loading.done{display:none;}
#loading h2{font-size:18px;color:var(--teal);}
#loading p{font-size:13px;color:var(--text2);}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SIDEBAR */
#sidebar{width:280px;min-width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#sidebar-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);background:var(--bg3);}
#sidebar-header h1{font-size:13px;font-weight:700;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;}
#sidebar-header p{font-size:11px;color:var(--text2);margin-top:3px;}
#search-box{padding:10px 12px;border-bottom:1px solid var(--border);}
#search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
#search-input:focus{border-color:var(--teal);}
#search-input::placeholder{color:var(--text3);}

/* SPECIAL NAV ITEMS */
#special-nav{border-bottom:1px solid var(--border);padding:8px 10px;display:flex;flex-direction:column;gap:4px;}
.special-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .15s;font-size:13px;font-weight:600;border:1px solid transparent;}
.special-item:hover{background:var(--bg3);}
.special-item.active{background:var(--bg3);border-color:var(--border);}
.special-item.weak-item{color:var(--orange);}
.special-item.weak-item.active{border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.08);}
.special-item.fav-item{color:var(--pink);}
.special-item.fav-item.active{border-color:rgba(244,114,182,.3);background:rgba(244,114,182,.08);}
.special-icon{font-size:16px;}
.special-label{flex:1;}
.special-count{font-family:'Space Mono',monospace;font-size:11px;background:var(--bg);border-radius:10px;padding:1px 7px;font-weight:400;}
.weak-item .special-count{color:var(--orange);}
.fav-item .special-count{color:var(--pink);}

#nav-tree{flex:1;overflow-y:auto;padding:6px 0;}
#nav-tree::-webkit-scrollbar{width:4px;}
#nav-tree::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.part-group{margin-bottom:2px;}
.part-header{display:flex;align-items:center;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);transition:background .15s;user-select:none;gap:8px;}
.part-header:hover{background:var(--bg3);color:var(--text);}
.part-header.active{color:var(--teal);}
.part-arrow{font-size:10px;transition:transform .2s;display:inline-block;}
.part-group.open .part-arrow{transform:rotate(90deg);}
.part-badge{background:var(--bg3);border-radius:4px;padding:1px 6px;font-size:10px;font-family:'Space Mono',monospace;}
.part-label{flex:1;}
.day-list{display:none;padding:2px 0;}
.part-group.open .day-list{display:block;}
.day-item{display:flex;align-items:center;padding:5px 14px 5px 30px;cursor:pointer;font-size:12px;color:var(--text2);transition:background .15s,color .15s;gap:8px;}
.day-item:hover{background:var(--bg3);color:var(--text);}
.day-item.active{background:rgba(45,212,191,.1);color:var(--teal);border-right:2px solid var(--teal);}
.day-progress-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.day-progress-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .4s ease;}
.day-count{font-size:10px;font-family:'Space Mono',monospace;white-space:nowrap;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 22px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
#topbar-title{font-size:16px;font-weight:700;}
#topbar-sub{font-size:12px;color:var(--text2);}
.spacer{flex:1;}
.tab-btn{padding:6px 13px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
.tab-btn:hover{border-color:var(--teal);color:var(--teal);}
.tab-btn.active{background:var(--teal);border-color:var(--teal);color:#000;font-weight:700;}
#content{flex:1;overflow-y:auto;padding:24px;}
#content::-webkit-scrollbar{width:6px;}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* FLASHCARD */
#flashcard-view{display:flex;flex-direction:column;align-items:center;gap:18px;max-width:640px;margin:0 auto;}
.card-counter{font-size:13px;color:var(--text2);font-family:'Space Mono',monospace;}
.card-wrapper{width:100%;perspective:1200px;}
.card{width:100%;min-height:320px;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.card.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px;min-height:320px;}
.card-front{background:linear-gradient(135deg,#161b22 0%,#0d1117 100%);border:1px solid var(--border);box-shadow:var(--shadow);}
.card-back{background:linear-gradient(135deg,#0a1628 0%,#0d2137 100%);border:1px solid var(--teal-dim);box-shadow:0 4px 32px rgba(45,212,191,.15);transform:rotateY(180deg);}
.card-num{font-family:'Space Mono',monospace;font-size:12px;color:var(--text3);position:absolute;top:18px;left:22px;}
.card-pos{position:absolute;top:18px;right:22px;background:rgba(45,212,191,.15);color:var(--teal);border-radius:6px;padding:2px 10px;font-size:12px;font-weight:700;}
.card-word{font-family:'Noto Serif KR',serif;font-size:52px;font-weight:700;color:var(--text);text-align:center;line-height:1.2;}
.card-hint{margin-top:20px;font-size:12px;color:var(--text3);}
.card-meaning{font-size:30px;font-weight:700;color:var(--teal);text-align:center;margin-bottom:18px;}
.card-example-ko{font-family:'Noto Serif KR',serif;font-size:15px;color:var(--text);text-align:center;line-height:1.8;margin-bottom:8px;}
.card-example-zh{font-size:13px;color:var(--text2);text-align:center;line-height:1.7;}

/* CARD BADGES */
.card-badges{position:absolute;bottom:16px;right:16px;display:flex;gap:6px;align-items:center;}
.badge-known{font-size:12px;color:var(--green);}
.badge-fav{font-size:15px;}
.badge-weak{font-size:12px;color:var(--orange);}

/* CONTROLS */
.card-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
.ctrl-btn{padding:9px 20px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px;}
.ctrl-btn:hover{border-color:var(--teal);color:var(--teal);}
.ctrl-btn.primary{background:var(--teal);border-color:var(--teal);color:#000;font-weight:700;}
.ctrl-btn:disabled{opacity:.3;cursor:default;}
.known-btn{border-color:var(--green)!important;color:var(--green)!important;}
.known-btn:hover{background:rgba(52,211,153,.1)!important;}
.unknown-btn{border-color:var(--orange)!important;color:var(--orange)!important;}
.unknown-btn:hover{background:rgba(251,146,60,.1)!important;}
.fav-btn{border-color:var(--pink)!important;color:var(--pink)!important;}
.fav-btn:hover{background:rgba(244,114,182,.1)!important;}
.fav-btn.fav-active{background:rgba(244,114,182,.15)!important;}

/* PROGRESS */
.progress-row{width:100%;display:flex;flex-direction:column;gap:6px;}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);font-family:'Space Mono',monospace;}
.progress-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));border-radius:3px;transition:width .4s ease;}
.day-complete{background:rgba(52,211,153,.1);border:1px solid var(--green);border-radius:12px;padding:18px;text-align:center;color:var(--green);font-size:16px;font-weight:700;}

/* LIST VIEW */
#list-view{max-width:900px;margin:0 auto;}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.word-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;position:relative;}
.word-card:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.word-card.known-card{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.04);}
.word-card.weak-card{border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.04);}
.word-card.fav-card{border-color:rgba(244,114,182,.3);}
.wc-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.wc-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);}
.wc-pos{background:rgba(45,212,191,.12);color:var(--teal);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700;}
.wc-badges{margin-left:auto;display:flex;gap:4px;align-items:center;}
.wc-known{font-size:11px;color:var(--green);}
.wc-weak{font-size:11px;color:var(--orange);}
.wc-fav{font-size:13px;}
.wc-word{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;margin-bottom:4px;}
.wc-meaning{font-size:14px;color:var(--teal);font-weight:500;}
.wc-no-meaning{font-size:12px;color:var(--text3);font-style:italic;}
.wc-day-tag{position:absolute;top:12px;right:12px;font-size:10px;color:var(--text3);font-family:'Space Mono',monospace;}

/* QUIZ */
#quiz-view{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:22px;}
.quiz-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px;text-align:center;}
.quiz-word{font-family:'Noto Serif KR',serif;font-size:48px;font-weight:700;margin-bottom:8px;}
.quiz-day-hint{font-size:12px;color:var(--text3);margin-bottom:20px;font-family:'Space Mono',monospace;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.quiz-opt{padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;line-height:1.4;}
.quiz-opt:hover:not(:disabled){border-color:var(--teal);color:var(--teal);}
.quiz-opt.correct{background:rgba(52,211,153,.15);border-color:var(--green);color:var(--green);}
.quiz-opt.wrong{background:rgba(248,113,113,.1);border-color:var(--red);color:var(--red);}
.quiz-opt:disabled{cursor:default;}
.quiz-score-row{display:flex;gap:16px;justify-content:center;font-size:14px;font-family:'Space Mono',monospace;}
.q-correct{color:var(--green);}
.q-wrong{color:var(--red);}
.quiz-result{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;text-align:center;}
.result-score{font-size:56px;font-weight:700;color:var(--teal);font-family:'Space Mono',monospace;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-num{font-size:28px;font-weight:700;color:var(--teal);font-family:'Space Mono',monospace;}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:4px;}

/* SPECIAL REVIEW HEADER */
.review-header{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;}
.review-header-icon{font-size:28px;}
.review-header-text h3{font-size:15px;font-weight:700;}
.review-header-text p{font-size:12px;color:var(--text2);margin-top:3px;}
.review-header-count{margin-left:auto;font-family:'Space Mono',monospace;font-size:20px;font-weight:700;}
.review-header.weak-header{border-color:rgba(251,146,60,.3);}
.review-header.weak-header .review-header-count{color:var(--orange);}
.review-header.fav-header{border-color:rgba(244,114,182,.3);}
.review-header.fav-header .review-header-count{color:var(--pink);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-state .emoji{font-size:52px;margin-bottom:16px;}
.empty-state h3{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.empty-state p{font-size:13px;line-height:1.7;}

/* SEARCH */
#search-results{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;backdrop-filter:blur(4px);padding:60px 24px 24px;overflow-y:auto;}
#search-results.show{display:block;}
.sr-inner{max-width:700px;margin:0 auto;}
.sr-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.sr-title{font-size:16px;font-weight:700;}
.sr-close{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;}
.sr-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:10px;cursor:pointer;transition:all .15s;}
.sr-item:hover{border-color:var(--teal);}
.sr-word{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;}
.sr-meta{font-size:12px;color:var(--text2);margin-top:4px;}
.sr-meaning{color:var(--teal);font-size:14px;margin-top:4px;}

/* MOBILE */
#menu-btn{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px;}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;}
@media(max-width:720px){
  #menu-btn{display:block;}
  #sidebar{position:fixed;left:-280px;top:0;bottom:0;z-index:50;transition:left .3s ease;}
  #sidebar.open{left:0;}
  #sidebar-overlay.show{display:block;}
  #content{padding:16px;}
  .card-word{font-size:38px;}
  .card-face{padding:28px 20px;}
  .ctrl-btn{padding:8px 14px;font-size:12px;}
  .quiz-options{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>載入中…</h2>
  <p>正在讀取 manifest.json</p>
</div>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>TOPIK 2 字彙</h1>
    <p>新韓檢中高級 · 60天搶分王</p>
  </div>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="搜尋韓文或中文意思…" autocomplete="off">
  </div>

  <!-- Special review shortcuts -->
  <div id="special-nav">
    <div class="special-item weak-item" id="nav-weak" onclick="enterSpecialMode('weak')">
      <span class="special-icon">⚡</span>
      <span class="special-label">特別不熟複習</span>
      <span class="special-count" id="weak-count">0</span>
    </div>
    <div class="special-item fav-item" id="nav-fav" onclick="enterSpecialMode('fav')">
      <span class="special-icon">❤️</span>
      <span class="special-label">我的最愛</span>
      <span class="special-count" id="fav-count">0</span>
    </div>
  </div>

  <div id="nav-tree"></div>
</div>

<div id="main">
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    <div>
      <div id="topbar-title">TOPIK2 字彙</div>
      <div id="topbar-sub">載入中…</div>
    </div>
    <div class="spacer"></div>
    <button class="tab-btn active" id="tab-card" onclick="switchView('card')">📇 翻牌</button>
    <button class="tab-btn" id="tab-list" onclick="switchView('list')">📋 列表</button>
    <button class="tab-btn" id="tab-quiz" onclick="switchView('quiz')">✏️ 測驗</button>
  </div>
  <div id="content">
    <div id="flashcard-view"></div>
    <div id="list-view" style="display:none"></div>
    <div id="quiz-view" style="display:none"></div>
  </div>
</div>

<div id="search-results">
  <div class="sr-inner">
    <div class="sr-header">
      <div class="sr-title" id="sr-title">搜尋結果</div>
      <button class="sr-close" onclick="closeSearch()">✕ 關閉</button>
    </div>
    <div id="sr-list"></div>
  </div>
</div>

<script>
// ── STATE ──
let MANIFEST = null;
let dayCache = {};
let currentDay = 1;
let currentWords = [];
let currentView = 'card';
let cardIndex = 0;
let isFlipped = false;
let quizState = null;
let specialMode = null;   // null | 'weak' | 'fav'
let specialWords = [];    // words for special review

// ── BOOT ──
fetch('manifest.json')
  .then(r => { if(!r.ok) throw new Error('找不到 manifest.json'); return r.json(); })
  .then(data => {
    MANIFEST = data;
    document.getElementById('loading').classList.add('done');
    updateSpecialCounts();
    buildSidebar();
    loadDay(1);
  })
  .catch(err => {
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;color:var(--red)">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <h2 style="margin-bottom:8px">無法載入資料</h2>
        <p style="color:var(--text2)">${err.message}</p>
        <p style="color:var(--text3);font-size:12px;margin-top:16px">請確認 manifest.json 與 index.html 在同一個資料夾</p>
      </div>`;
  });

// ── LOAD DAY ──
async function loadDayData(dayNum) {
  if (dayCache[dayNum]) return dayCache[dayNum];
  const meta = MANIFEST.days.find(d => d.day === dayNum);
  if (!meta) return [];
  try {
    const r = await fetch(meta.file);
    if (!r.ok) return [];
    const words = await r.json();
    dayCache[dayNum] = words;
    return words;
  } catch { return []; }
}

async function loadDay(dayNum) {
  specialMode = null;
  currentDay = dayNum;
  cardIndex = 0;
  isFlipped = false;
  updateSpecialNav(null);

  const meta = MANIFEST.days.find(d => d.day === dayNum);
  const part = MANIFEST.parts.find(p => p.num === (meta ? meta.part : 1));
  document.getElementById('topbar-title').textContent = 'Day ' + dayNum;
  document.getElementById('topbar-sub').textContent = (part ? part.zh : '') + ' · 載入中…';

  currentWords = await loadDayData(dayNum);
  document.getElementById('topbar-sub').textContent =
    (part ? part.zh : '') + ' · ' + currentWords.length + ' 個單字';

  updateSidebarDay(dayNum);
  renderCurrentView();
}

// ── SPECIAL MODES ──
async function enterSpecialMode(mode) {
  specialMode = mode;
  updateSpecialNav(mode);
  document.querySelectorAll('.day-item').forEach(el => el.classList.remove('active'));
  cardIndex = 0;
  isFlipped = false;

  if (mode === 'weak') {
    document.getElementById('topbar-title').textContent = '⚡ 特別不熟複習';
    document.getElementById('topbar-sub').textContent = '收集所有需加強的單字';
    specialWords = await collectSpecialWords('weak');
    currentWords = specialWords;
    document.getElementById('topbar-sub').textContent = `共 ${specialWords.length} 個待加強單字`;
  } else {
    document.getElementById('topbar-title').textContent = '❤️ 我的最愛';
    document.getElementById('topbar-sub').textContent = '收集所有加入最愛的單字';
    specialWords = await collectSpecialWords('fav');
    currentWords = specialWords;
    document.getElementById('topbar-sub').textContent = `共 ${specialWords.length} 個最愛單字`;
  }

  closeSidebar();
  renderCurrentView();
}

async function collectSpecialWords(mode) {
  const p = getP();
  const result = [];

  if (mode === 'weak') {
    // Collect all word IDs marked weak
    const weakMap = p.weak || {};
    for (const [dayNum, ids] of Object.entries(weakMap)) {
      if (Object.keys(ids).length === 0) continue;
      const words = await loadDayData(parseInt(dayNum));
      for (const w of words) {
        if (ids[wordId(w)]) result.push({...w, _day: parseInt(dayNum)});
      }
    }
  } else {
    // Collect all favorited word IDs
    const favMap = p.favs || {};
    // Need to search all days that are cached + days where favorites exist
    const daysToLoad = new Set(Object.keys(favMap).map(Number));
    for (const dn of daysToLoad) {
      const words = await loadDayData(dn);
      for (const w of words) {
        if (favMap[dn] && favMap[dn][wordId(w)]) {
          result.push({...w, _day: dn});
        }
      }
    }
  }
  return result;
}

function updateSpecialNav(mode) {
  document.getElementById('nav-weak').classList.toggle('active', mode === 'weak');
  document.getElementById('nav-fav').classList.toggle('active', mode === 'fav');
}

function updateSpecialCounts() {
  const p = getP();
  const weakCount = Object.values(p.weak || {}).reduce((s,d) => s + Object.keys(d).length, 0);
  const favCount = Object.values(p.favs || {}).reduce((s,d) => s + Object.keys(d).length, 0);
  document.getElementById('weak-count').textContent = weakCount;
  document.getElementById('fav-count').textContent = favCount;
}

// ── PROGRESS / STORAGE ──
function getP() {
  try { return JSON.parse(localStorage.getItem('topik2_prog') || '{"known":{},"weak":{},"favs":{}}'); }
  catch { return {"known":{},"weak":{},"favs":{}}; }
}
function saveP(p) { localStorage.setItem('topik2_prog', JSON.stringify(p)); }

function markKnown(id, day) {
  const p = getP();
  if (!p.known) p.known = {};
  if (!p.known[day]) p.known[day] = {};
  p.known[day][id] = 1;
  // Remove from weak when marking known
  if (p.weak && p.weak[day]) delete p.weak[day][id];
  saveP(p); updateSpecialCounts();
}
function markUnknown(id, day) {
  const p = getP();
  if (!p.known) p.known = {};
  if (p.known[day]) delete p.known[day][id];
  saveP(p);
}
function markWeak(id, day) {
  const p = getP();
  if (!p.weak) p.weak = {};
  if (!p.weak[day]) p.weak[day] = {};
  p.weak[day][id] = 1;
  // Also unmark known
  if (p.known && p.known[day]) delete p.known[day][id];
  saveP(p); updateSpecialCounts();
}
function unmarkWeak(id, day) {
  const p = getP();
  if (p.weak && p.weak[day]) delete p.weak[day][id];
  saveP(p); updateSpecialCounts();
}
function toggleFav(id, day) {
  const p = getP();
  if (!p.favs) p.favs = {};
  if (!p.favs[day]) p.favs[day] = {};
  if (p.favs[day][id]) delete p.favs[day][id];
  else p.favs[day][id] = 1;
  saveP(p); updateSpecialCounts();
}

function isKnown(id, day) { const p=getP(); return !!(p.known && p.known[day] && p.known[day][id]); }
function isWeak(id, day)  { const p=getP(); return !!(p.weak  && p.weak[day]  && p.weak[day][id]);  }
function isFav(id, day)   { const p=getP(); return !!(p.favs  && p.favs[day]  && p.favs[day][id]);  }
function getDayKnown(day) { const p=getP(); return Object.keys((p.known||{})[day]||{}).length; }

// ── HELPERS ──
function wordId(w) { return w.id || (String(w._day || currentDay) + '-' + w.word_no); }
function posDisplay(w) {
  if (w.pos_short) return w.pos_short;
  const map = {'名詞':'名','動詞':'動','副詞':'副','形容詞':'形','冠形詞':'冠'};
  return map[w.pos_zh] || w.pos_zh || '';
}
function effectiveDay(w) { return w._day || currentDay; }

// ── SIDEBAR ──
function buildSidebar() {
  const nav = document.getElementById('nav-tree');
  nav.innerHTML = '';
  MANIFEST.parts.forEach((part, pi) => {
    const grp = document.createElement('div');
    grp.className = 'part-group' + (pi === 0 ? ' open' : '');
    const hdr = document.createElement('div');
    hdr.className = 'part-header' + (pi === 0 ? ' active' : '');
    hdr.innerHTML = `<span class="part-badge">P${String(part.num).padStart(2,'0')}</span><span class="part-label">${part.zh}</span><span class="part-arrow">›</span>`;
    hdr.onclick = () => {
      grp.classList.toggle('open');
      document.querySelectorAll('.part-header').forEach(h => h.classList.remove('active'));
      if (grp.classList.contains('open')) hdr.classList.add('active');
    };
    const dl = document.createElement('div');
    dl.className = 'day-list';
    part.days.forEach(dn => {
      const meta = MANIFEST.days.find(d => d.day === dn);
      const total = meta ? meta.word_count : 40;
      const known = getDayKnown(dn);
      const pct = total > 0 ? (known / total * 100).toFixed(0) : 0;
      const di = document.createElement('div');
      di.className = 'day-item' + (dn === currentDay && !specialMode ? ' active' : '');
      di.id = 'nav-day-' + dn;
      di.innerHTML = `<span>Day ${dn}</span><div class="day-progress-bar"><div class="day-progress-fill" style="width:${pct}%"></div></div><span class="day-count">${known}/${total}</span>`;
      di.onclick = () => { loadDay(dn); closeSidebar(); };
      dl.appendChild(di);
    });
    grp.appendChild(hdr); grp.appendChild(dl); nav.appendChild(grp);
  });
}

function updateSidebarDay(dn) {
  document.querySelectorAll('.day-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-day-' + dn);
  if (!el) return;
  el.classList.add('active');
  const meta = MANIFEST.days.find(d => d.day === dn);
  const total = meta ? meta.word_count : currentWords.length;
  const known = getDayKnown(dn);
  const pct = total > 0 ? (known / total * 100).toFixed(0) : 0;
  el.querySelector('.day-progress-fill').style.width = pct + '%';
  el.querySelector('.day-count').textContent = known + '/' + total;
}

function flipCard(){isFlipped=!isFlipped;const c=document.getElementById('the-card');if(c)c.classList.toggle('flipped',isFlipped);}
function prevCard(){if(cardIndex>0){cardIndex--;isFlipped=false;renderCard();}}
function nextCard(){if(cardIndex<currentWords.length-1){cardIndex++;isFlipped=false;renderCard();}}

function markCardKnown() {
  const w = currentWords[cardIndex];
  const day = effectiveDay(w);
  markKnown(wordId(w), day);
  if (!specialMode) updateSidebarDay(day);
  // In special weak mode, remove card from list when marked known
  if (specialMode === 'weak') {
    currentWords.splice(cardIndex, 1);
    if (cardIndex >= currentWords.length) cardIndex = Math.max(0, currentWords.length - 1);
    document.getElementById('topbar-sub').textContent = `共 ${currentWords.length} 個待加強單字`;
    updateSpecialCounts();
  } else {
    if (cardIndex < currentWords.length - 1) { cardIndex++; isFlipped = false; }
  }
  renderCard();
}

function markCardWeak() {
  const w = currentWords[cardIndex];
  const day = effectiveDay(w);
  markWeak(wordId(w), day);
  if (!specialMode) updateSidebarDay(day);
  if (cardIndex < currentWords.length - 1) { cardIndex++; isFlipped = false; }
  renderCard();
}

function toggleCardFav() {
  const w = currentWords[cardIndex];
  const day = effectiveDay(w);
  toggleFav(wordId(w), day);
  // In fav mode, remove when unfavorited
  if (specialMode === 'fav' && !isFav(wordId(w), day)) {
    currentWords.splice(cardIndex, 1);
    if (cardIndex >= currentWords.length) cardIndex = Math.max(0, currentWords.length - 1);
    document.getElementById('topbar-sub').textContent = `共 ${currentWords.length} 個最愛單字`;
  }
  renderCard();
}

document.addEventListener('keydown', e => {
  if (document.getElementById('search-input') === document.activeElement) return;
  if (currentView === 'card') {
    if (e.key === 'ArrowLeft') prevCard();
    else if (e.key === 'ArrowRight') nextCard();
    else if (e.key === ' ') { e.preventDefault(); flipCard(); }
    else if (e.key === 'Enter') markCardKnown();
    else if (e.key === 'f' || e.key === 'F') toggleCardFav();
  }
});

function answerQuiz(btn, chosen, correct) {
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  const w = quizState.words[quizState.idx];
  const day = effectiveDay(w);
  if (chosen === correct) {
    btn.classList.add('correct');
    quizState.correct++;
    markKnown(wordId(w), day);
    if (!specialMode) updateSidebarDay(day);
  } else {
    btn.classList.add('wrong');
    quizState.wrong++;
    markWeak(wordId(w), day);  // Auto-mark wrong answers as weak!
  }
  quizState.idx++;
  setTimeout(renderQuizCard, 800);
}

// ── SEARCH ──
let sTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(sTimer);
  const q = e.target.value.trim();
  if (!q) { closeSearch(); return; }
  sTimer = setTimeout(() => doSearch(q), 250);
});

function doSearch(q) {
  const results = [];
  for (const [dayNum, words] of Object.entries(dayCache)) {
    for (const w of words) {
      if (w.word.includes(q) || (w.meaning_zh&&w.meaning_zh.includes(q)) || (w.example_ko&&w.example_ko.includes(q))) {
        results.push({...w, _day: parseInt(dayNum)});
        if (results.length >= 30) break;
      }
    }
    if (results.length >= 30) break;
  }
  const note = Object.keys(dayCache).length < 60 ? '（僅搜尋已載入的天）' : '';
  document.getElementById('sr-title').textContent = `搜尋「${q}」— ${results.length} 筆${note}`;
  document.getElementById('sr-list').innerHTML = results.map(w => {
    const part = MANIFEST.parts.find(p => p.days.includes(w._day));
    const pos = posDisplay(w);
    const fv = isFav(wordId(w), w._day);
    const wk = isWeak(wordId(w), w._day);
    return `<div class="sr-item" onclick="goToWord(${w._day},${w.word_no-1})">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="sr-word">${w.word}</span>
        ${pos?`<span class="wc-pos">${pos}</span>`:''}
        ${fv?'<span>❤️</span>':''}${wk?'<span style="color:var(--orange);font-size:12px">⚡</span>':''}
        <span style="font-size:11px;color:var(--text3);margin-left:auto">Day ${w._day}</span>
      </div>
      <div class="sr-meta">${part?part.zh:''} · #${w.word_no}</div>
      ${w.meaning_zh?`<div class="sr-meaning">${w.meaning_zh}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('search-results').classList.add('show');
}

function closeSearch() {
  document.getElementById('search-results').classList.remove('show');
  document.getElementById('search-input').value = '';
}
function goToWord(dn, idx) {
  closeSearch(); specialMode = null; updateSpecialNav(null);
  cardIndex = idx; isFlipped = false;
  loadDay(dn); switchView('card');
}

// ── MOBILE ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}
</script>
